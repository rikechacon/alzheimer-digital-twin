version: '3.8'

services:
  api:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
    container_name: alzdt-api-prod
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=False
      - DATABASE_URL=postgresql://user:password@db:5432/alzdt_db
      - REDIS_URL=redis://redis:6379/0
    networks:
      - alzdt-network
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: alzdt-postgres
    environment:
      - POSTGRES_DB=alzdt_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alzdt-network

  redis:
    image: redis:7-alpine
    container_name: alzdt-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - alzdt-network

  nginx:
    image: nginx:alpine
    container_name: alzdt-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - alzdt-network

volumes:
  postgres_data:
  redis_data:

networks:
  alzdt-network:
    driver: bridge
